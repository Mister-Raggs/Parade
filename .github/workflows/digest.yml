name: Daily Funding Digest

on:
  schedule:
    - cron: '0 8 * * *'  # 8:00 AM UTC daily (3 AM EST / midnight PST)
  workflow_dispatch:       # Manual trigger for testing

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: digest/requirements.txt

      - name: Install dependencies
        run: pip install -r digest/requirements.txt

      - name: Debug secret lengths
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          echo "GMAIL_USER length: ${#GMAIL_USER}"
          echo "GMAIL_APP_PASSWORD length: ${#GMAIL_APP_PASSWORD}"
          echo "RECIPIENT_EMAIL length: ${#RECIPIENT_EMAIL}"

      - name: Run digest
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          MAX_COMPANIES: "15"
          MAX_JOBS_PER_CO: "5"
          LOOKBACK_HOURS: "24"
        run: python -m digest.main

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: digest-logs
          path: "*.log"
          retention-days: 7
